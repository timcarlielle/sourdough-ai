# Render Blueprint (alternative deploy target — untested against the current Dockerfiles;
# the supported path is docker-compose self-hosting, see docs/self-hosting.md)
# https://render.com/docs/blueprint-spec
# Create a Render account, connect repo, add env vars in dashboard (DATABASE_URL, REDIS_URL, NEXTAUTH_SECRET, OPENAI_API_KEY, etc.)

services:
  - type: web
    name: web-app
    runtime: docker
    dockerfilePath: ./apps/web-app/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sourdough-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sourdough-redis
          property: connectionString
      - key: NEXTAUTH_URL
        generateValue: true
      - key: NEXTAUTH_SECRET
        generateValue: true

  - type: web
    name: ingest-api
    runtime: docker
    dockerfilePath: ./apps/ingest-api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sourdough-db
          property: connectionString

  - type: worker
    name: worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sourdough-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sourdough-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: sourdough-db
    plan: free
    databaseName: sourdough
    user: sourdough

  - type: redis
    name: sourdough-redis
    plan: free
