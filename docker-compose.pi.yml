# Split stack — "hub" host (e.g. a Raspberry Pi): 24/7 postgres, redis, and sensor ingest.
# The app stack (web + worker + migrate) runs on another machine via docker-compose.mac.yml
# and connects to this host. See docs/Split-Stack.md.
#
#   docker compose -f docker-compose.pi.yml up -d --build
#
# NOTE: postgres/redis are exposed on the LAN so the app host can reach them.
# Only run this on a trusted network, and set POSTGRES_PASSWORD in .env.
# Database migrations are applied by the app stack's migrate service.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sourdough}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sourdough}
      POSTGRES_DB: ${POSTGRES_DB:-sourdough}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sourdough} -d ${POSTGRES_DB:-sourdough}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ingest-api:
    build:
      context: .
      dockerfile: apps/ingest-api/Dockerfile
    image: sourdough-ingest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sourdough}:${POSTGRES_PASSWORD:-sourdough}@postgres:5432/${POSTGRES_DB:-sourdough}
      REDIS_URL: redis://redis:6379
      INGEST_API_PORT: "3001"
    ports:
      - "0.0.0.0:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data: {}
  redis_data: {}
